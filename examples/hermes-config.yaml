# Minimal Hermes config fragment for the EvalOps gateway path.
#
# Once EVA-157 is deployed, this routes Hermes LLM calls through the EvalOps
# OpenAI-compatible gateway while the plugin contributes session/tool spans.
custom_providers:
  evalops-gateway:
    base_url: https://llm-gateway.evalops.dev/v1
    api_key_env: EVALOPS_API_KEY
    api_mode: chat_completions

model:
  provider: evalops-gateway

